name: Regulatory Feed (Project 2)

# Cron DISABLED — manual trigger only until feed is ready for production
on:
  workflow_dispatch:
    inputs:
      jurisdiction:
        description: "Single jurisdiction to run (leave blank for all 24)"
        required: false
        default: ""

jobs:
  feed:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r automation/requirements.txt

      - name: Run regulatory feed
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
          RUN_JURISDICTION:  ${{ github.event.inputs.jurisdiction }}
        run: |
          cd automation
          python feed_runner.py
