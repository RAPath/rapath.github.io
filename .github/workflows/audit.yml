name: Website Audit (Project 1)

on:
  schedule:
    - cron: "0 1 * * *"   # runs daily at 1:00 AM UTC
  workflow_dispatch:        # also allows manual trigger from GitHub Actions tab

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r automation/requirements.txt

      - name: Run audit
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN:      ${{ secrets.AUDIT_PAT }}   # PAT needed to write to private repo
          AUDIT_PAT:         ${{ secrets.AUDIT_PAT }}
        run: |
          cd automation
          python audit_runner.py
