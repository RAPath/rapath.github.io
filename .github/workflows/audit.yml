name: Website Audit (Project 1)

on:
  workflow_dispatch:   # manual trigger only — runs all 24 jurisdictions

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r automation/requirements.txt

      - name: Run audit — all 24 jurisdictions
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AUDIT_PAT:         ${{ secrets.AUDIT_PAT }}
          RUN_ALL:           "true"
        run: |
          cd automation
          python audit_runner.py
