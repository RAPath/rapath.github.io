name: Deploy RAPath to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Required for GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Only allow one deployment at a time
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ── Build all sites in parallel ────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        site: [hub, au, eu, hc, sg, uk, us, jp, swiss, cn, in, kr, br, my, id, vt, ru, nz, sa, mx]
      fail-fast: false   # don't cancel other sites if one fails

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history needed by gitEagerVcs (enabled via future.v4)

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build ${{ matrix.site }}
        run: npm run build:${{ matrix.site }}

      - name: Upload ${{ matrix.site }} build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.site }}
          path: sites/${{ matrix.site }}/build
          retention-days: 1

  # ── Merge all builds and deploy ────────────────────────────────────────────
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Download hub build
        uses: actions/download-artifact@v4
        with:
          name: build-hub
          path: dist/

      - name: Download jurisdiction builds
        uses: actions/download-artifact@v4
        with:
          pattern: build-*
          merge-multiple: false
          path: artifacts/

      - name: Merge builds into dist/
        run: |
          for site in au eu hc sg uk us jp swiss cn in kr br my id vt ru nz sa mx; do
            if [ -d "artifacts/build-$site" ]; then
              mkdir -p "dist/$site"
              cp -r "artifacts/build-$site/." "dist/$site/"
              echo "✓ Merged $site"
            fi
          done

      - name: Upload merged Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
